<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Room Designer PRO MAX</title>

<style>
body { margin:0; overflow:hidden; background:#f0f0f0; font-family:sans-serif; }

#ui {
  position:absolute; left:20px; top:20px;
  background:white; padding:15px; border-radius:12px;
  width:260px; box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

label { font-size:12px; }
input { width:100%; }

button {
  width:100%; margin-top:6px; padding:10px;
  border:none; border-radius:8px;
  background:#0077cc; color:white; cursor:pointer;
}

#catalog {
  margin-top:10px;
  border-top:1px solid #ddd;
  padding-top:10px;
}

#info {
  position:absolute; right:20px; top:20px;
  background:white; padding:15px; border-radius:12px;
}
</style>
</head>

<body>

<div id="ui">
  <h3>Room Control</h3>

  <label>กว้าง (m)</label>
  <input type="range" id="w" min="2" max="10" step="0.1" value="5">

  <label>ยาว (m)</label>
  <input type="range" id="l" min="2" max="10" step="0.1" value="5">

  <label>สูง (m)</label>
  <input type="range" id="h" min="2" max="4" step="0.1" value="2.6">

  <button onclick="autoPlaceAC()">🤖 AI วางแอร์</button>

  <div id="catalog">
    <b>Furniture</b>
    <button onclick="addItem('bed')">เตียง</button>
    <button onclick="addItem('sofa')">โซฟา</button>
    <button onclick="addItem('ac')">แอร์</button>
  </div>
</div>

<div id="info">BTU: -</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

// camera (ล็อกมุม)
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(6,6,6);
camera.lookAt(0,0,0);

// renderer
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// light
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);

// floor (ไม้)
const tex = new THREE.TextureLoader().load('https://threejs.org/examples/textures/hardwood2_diffuse.jpg');
tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
tex.repeat.set(4,4);

const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(10,10),
  new THREE.MeshStandardMaterial({map:tex})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// walls
let walls = [];
function createWalls(w,l,h){
  walls.forEach(x=>scene.remove(x));
  walls=[];

  const mat = new THREE.MeshStandardMaterial({color:0xffffff});

  function wall(x,z,rot,len){
    let m = new THREE.Mesh(new THREE.BoxGeometry(len,h,0.1),mat);
    m.position.set(x,h/2,z);
    m.rotation.y = rot;
    scene.add(m);
    walls.push(m);
  }

  wall(0,-l/2,0,w);
  wall(0,l/2,0,w);
  wall(-w/2,0,Math.PI/2,l);
  wall(w/2,0,Math.PI/2,l);
}

// objects
let objects=[];

// 📦 catalog items
function addItem(type){
  let mesh;

  if(type==="bed"){
    mesh = new THREE.Mesh(
      new THREE.BoxGeometry(2,0.5,2),
      new THREE.MeshStandardMaterial({color:"#8888ff"})
    );
  }
  else if(type==="sofa"){
    mesh = new THREE.Mesh(
      new THREE.BoxGeometry(2,1,1),
      new THREE.MeshStandardMaterial({color:"#00aaff"})
    );
  }
  else if(type==="ac"){
    mesh = new THREE.Mesh(
      new THREE.BoxGeometry(1.5,0.4,0.4),
      new THREE.MeshStandardMaterial({color:"#eeeeee"})
    );
    mesh.position.y = 2.2;
    createLabel(mesh,"DAIKIN 12000 BTU");
  }

  mesh.position.set(0,0.5,0);
  scene.add(mesh);
  objects.push(mesh);
}

// 🎯 drag + rotate + scale
let selected=null;
let mode="move";

window.addEventListener("keydown",(e)=>{
  if(e.key==="r") mode="rotate";
  if(e.key==="s") mode="scale";
  if(e.key==="m") mode="move";
});

const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();

window.addEventListener("mousedown",(e)=>{
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;

  raycaster.setFromCamera(mouse,camera);
  let hit=raycaster.intersectObjects(objects);
  if(hit.length>0) selected=hit[0].object;
});

window.addEventListener("mousemove",(e)=>{
  if(!selected) return;

  if(mode==="move"){
    selected.position.x += (e.movementX * 0.01);
    selected.position.z += (e.movementY * 0.01);
  }

  if(mode==="rotate"){
    selected.rotation.y += e.movementX * 0.01;
  }

  if(mode==="scale"){
    let s = 1 + e.movementX*0.01;
    selected.scale.multiplyScalar(s);
  }
});

window.addEventListener("mouseup",()=>selected=null);

// 📏 measure distance
window.addEventListener("dblclick",(e)=>{
  const x = (e.clientX/innerWidth)*2-1;
  const y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera({x,y},camera);
  let p = new THREE.Vector3();
  raycaster.ray.at(5,p);
  alert("ตำแหน่ง: "+p.x.toFixed(2)+" , "+p.z.toFixed(2)+" เมตร");
});

// 🤖 AI แนะนำแอร์
function autoPlaceAC(){
  let ac = new THREE.Mesh(
    new THREE.BoxGeometry(1.5,0.4,0.4),
    new THREE.MeshStandardMaterial({color:"#ffffff"})
  );

  ac.position.set(0,2.2,-2); // ติดผนังด้านหนึ่ง
  scene.add(ac);
  createLabel(ac,"AI Recommended AC");
  objects.push(ac);
}

// 🏷️ label
function createLabel(obj,text){
  const c=document.createElement("canvas");
  const ctx=c.getContext("2d");
  c.width=256; c.height=64;

  ctx.fillStyle="white";
  ctx.fillRect(0,0,256,64);
  ctx.fillStyle="black";
  ctx.font="20px Arial";
  ctx.fillText(text,10,40);

  const tex=new THREE.CanvasTexture(c);
  const sprite=new THREE.Sprite(new THREE.SpriteMaterial({map:tex}));
  sprite.scale.set(2,0.5,1);
  sprite.position.set(0,1.5,0);

  obj.add(sprite);
}

// sliders
const w=document.getElementById("w");
const l=document.getElementById("l");
const h=document.getElementById("h");

function updateRoom(){
  createWalls(parseFloat(w.value),parseFloat(l.value),parseFloat(h.value));

  let btu = w.value*l.value*700;
  document.getElementById("info").innerHTML="BTU: "+Math.round(btu);
}

w.oninput=updateRoom;
l.oninput=updateRoom;
h.oninput=updateRoom;

updateRoom();

// render
function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
