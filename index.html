<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAIKIN 3D AI Room (Fixed v2)</title>
<style>
body { margin:0; background:black; color:white; font-family:-apple-system; overflow:hidden; }
.ui { position:absolute; top:20px; left:20px; background:rgba(255,255,255,0.08); backdrop-filter: blur(20px); padding:20px; border-radius:20px; width:280px; }
input { width:100%; margin-top:8px; padding:8px; border-radius:10px; border:none; }
button { margin-top:10px; width:100%; padding:10px; border:none; border-radius:10px; background:white; color:black; font-weight:bold; }
.info { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); font-size:18px; text-align:center; }
</style>
</head>
<body>

<div class="ui">
<h3>DAIKIN AI ROOM</h3>
กว้าง (m)<input id="w" type="number" value="4">
ยาว (m)<input id="l" type="number" value="5">
สูง (m)<input id="h" type="number" value="2.6">
<button onclick="updateRoom()">Update Room</button>
</div>

<div class="info" id="info">--</div>

<!-- ✅ FIX: ใช้ module -->
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/controls/OrbitControls.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/loaders/GLTFLoader.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(5,5,8);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// LIGHT
scene.add(new THREE.HemisphereLight(0xffffff,0x444444,1.5));
const dir = new THREE.DirectionalLight(0xffffff,2);
dir.position.set(5,10,7);
scene.add(dir);

// FIX: declare ก่อน
let roomMesh = null;

function createRoom(w,l,h){
 if(roomMesh){
   scene.remove(roomMesh);
 }
 const geo = new THREE.BoxGeometry(w,h,l);
 const mat = new THREE.MeshStandardMaterial({color:0x333355, wireframe:true});
 roomMesh = new THREE.Mesh(geo, mat);
 roomMesh.position.y = h/2;
 scene.add(roomMesh);
}

// LOADER
const loader = new GLTFLoader();

function loadModel(file,x,y,z,scale){
 loader.load(file,(gltf)=>{
   const obj = gltf.scene;
   obj.position.set(x,y,z);
   obj.scale.set(scale,scale,scale);
   scene.add(obj);
   console.log(file+" OK");
 },undefined,(err)=>{
   console.error("โหลดไม่ได้",file);
 });
}

// LOAD
loadModel('1.glb',0,2,0,1);
loadModel('2.glb',-2,0,0,1);
loadModel('3.obj.glb',2,0,0,1);
loadModel('4.obj.glb',0,0,0,1);

// AIRFLOW
let particles=[];
for(let i=0;i<100;i++){
 let p=new THREE.Mesh(new THREE.SphereGeometry(0.03), new THREE.MeshBasicMaterial());
 p.position.set(0,2,0);
 scene.add(p);
 particles.push(p);
}

function airflow(){
 particles.forEach(p=>{
   p.position.x+=0.05;
   if(p.position.x>5) p.position.x=0;
 });
}

function updateRoom(){
 let w=+document.getElementById('w').value;
 let l=+document.getElementById('l').value;
 let h=+document.getElementById('h').value;

 createRoom(w,l,h);

 let area=w*l;
 let btu=area*750;

 document.getElementById('info').innerHTML=`${w} x ${l} x ${h} m<br>${area.toFixed(2)} m²<br>${Math.round(btu)} BTU`;
}

updateRoom();

function animate(){
 requestAnimationFrame(animate);
 airflow();
 controls.update();
 renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
