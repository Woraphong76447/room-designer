<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAIKIN 3D AI Room Experience</title>
<style>
body { margin:0; background:black; color:white; font-family:-apple-system; overflow:hidden; }
.ui {
 position:absolute; top:20px; left:20px;
 background:rgba(255,255,255,0.08);
 backdrop-filter: blur(20px);
 padding:20px; border-radius:20px; width:280px;
}
input { width:100%; margin-top:8px; padding:8px; border-radius:10px; border:none; }
button { margin-top:10px; width:100%; padding:10px; border:none; border-radius:10px; background:white; color:black; font-weight:bold; }
.info {
 position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
 font-size:18px; text-align:center;
}
</style>
</head>
<body>

<div class="ui">
<h3>DAIKIN AI ROOM</h3>
กว้าง (m)<input id="w" type="number" value="4">
ยาว (m)<input id="l" type="number" value="5">
สูง (m)<input id="h" type="number" value="2.6">
<button onclick="updateRoom()">Update Room</button>
</div>

<div class="info" id="info">--</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(6,5,8);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);

// LIGHT
const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
scene.add(light);

const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(5,10,7);
scene.add(dirLight);

// ROOM (dynamic box)
let roomMesh;
function createRoom(w,l,h){
 if(roomMesh) scene.remove(roomMesh);
 const geo = new THREE.BoxGeometry(w, h, l);
 const mat = new THREE.MeshStandardMaterial({color:0x222244, wireframe:true});
 roomMesh = new THREE.Mesh(geo, mat);
 roomMesh.position.y = h/2;
 scene.add(roomMesh);
}

// LOAD MODELS
const loader = new THREE.GLTFLoader();

function loadModel(file, x,y,z, scale){
 loader.load(file, function(gltf){
   let obj = gltf.scene;
   obj.position.set(x,y,z);
   obj.scale.set(scale,scale,scale);
   scene.add(obj);
 });
}

// LOAD YOUR FILES
loadModel('1.glb', 0,0,0, 0.5);   // แอร์
loadModel('2.glb', -1,0,-1, 0.7); // โซฟา
loadModel('3.obj.glb', 1,0,1, 0.7); // เตียง
loadModel('4.obj.glb', 0,0,0, 1); // ห้อง

// AIRFLOW PARTICLES
let particles = [];
for(let i=0;i<200;i++){
 let p = new THREE.Mesh(
   new THREE.SphereGeometry(0.03),
   new THREE.MeshBasicMaterial({color:0x00ccff})
 );
 p.position.set(0,2,0);
 particles.push(p);
 scene.add(p);
}

function airflow(){
 particles.forEach(p=>{
   p.position.x += 0.02;
   if(p.position.x > 5) p.position.x = 0;
 });
}

// UPDATE ROOM
function updateRoom(){
 let w = +document.getElementById('w').value;
 let l = +document.getElementById('l').value;
 let h = +document.getElementById('h').value;

 createRoom(w,l,h);

 let area = w*l;
 let btu = area * 750;

 document.getElementById('info').innerHTML = `\n ขนาดห้อง: ${w} x ${l} x ${h} เมตร <br>
 พื้นที่: ${area.toFixed(2)} ตร.ม. <br>
 BTU แนะนำ: ${Math.round(btu)} BTU`;

 // AI Voice
 let msg = new SpeechSynthesisUtterance("Room size " + w + " by " + l + " meters. Recommended cooling capacity " + Math.round(btu) + " BTU");
 speechSynthesis.speak(msg);
}

// INIT
updateRoom();

// LOOP
function animate(){
 requestAnimationFrame(animate);
 airflow();
 controls.update();
 renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
