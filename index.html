<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Smart Room Designer PRO+</title>

<style>
body { margin:0; overflow:hidden; background:#0f0f0f; font-family:sans-serif; }

#ui {
  position:absolute;
  left:20px;
  top:20px;
  background:#1c1c1c;
  padding:15px;
  border-radius:12px;
  color:white;
  width:240px;
}

button {
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#0077cc;
  color:white;
}

#btu {
  position:absolute;
  right:20px;
  top:20px;
  background:#1c1c1c;
  padding:15px;
  border-radius:10px;
  color:white;
}
</style>
</head>

<body>

<div id="ui">
  <h3>Room Designer</h3>
  <button onclick="addModel('sofa')">เพิ่มโซฟา</button>
  <button onclick="addModel('bed')">เพิ่มเตียง</button>
  <button onclick="saveLayout()">💾 Save</button>
  <button onclick="loadLayout()">📂 Load</button>
</div>

<div id="btu">BTU: -</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three/examples/js/loaders/GLTFLoader.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f0f0f);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(6,6,6);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);

// lighting
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
light.castShadow = true;
scene.add(light);

const ambient = new THREE.AmbientLight(0x404040);
scene.add(ambient);

// floor
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(10,10),
  new THREE.MeshStandardMaterial({color:0x222222})
);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

// walls
function createWall(x,z,rot){
  const wall = new THREE.Mesh(
    new THREE.BoxGeometry(10,2.5,0.1),
    new THREE.MeshStandardMaterial({color:0xaaaaaa})
  );
  wall.position.set(x,1.25,z);
  wall.rotation.y = rot;
  scene.add(wall);
}
createWall(0,-5,0);
createWall(0,5,0);
createWall(-5,0,Math.PI/2);
createWall(5,0,Math.PI/2);

// objects
let objects = [];
const loader = new THREE.GLTFLoader();

function addModel(type){
  let url = '';

  if(type==='sofa'){
    url = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Box/glTF/Box.gltf';
  }else{
    url = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF/Duck.gltf';
  }

  loader.load(url, (gltf)=>{
    let model = gltf.scene;
    model.position.set(0,0,0);
    model.scale.set(1,1,1);
    scene.add(model);
    objects.push(model);
  });
}

// drag + snap grid
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selected = null;

window.addEventListener('mousedown',(e)=>{
  mouse.x = (e.clientX / innerWidth)*2-1;
  mouse.y = -(e.clientY / innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  let hit = raycaster.intersectObjects(objects,true);
  if(hit.length>0){
    selected = hit[0].object.parent;
  }
});

window.addEventListener('mousemove',(e)=>{
  if(!selected) return;
  mouse.x = (e.clientX / innerWidth)*2-1;
  mouse.y = -(e.clientY / innerHeight)*2+1;

  raycaster.setFromCamera(mouse,camera);
  let plane = new THREE.Plane(new THREE.Vector3(0,1,0),0);
  let p = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane,p);

  // snap grid
  selected.position.x = Math.round(p.x);
  selected.position.z = Math.round(p.z);
});

window.addEventListener('mouseup',()=>selected=null);

// save/load
function saveLayout(){
  let data = objects.map(o=>({
    x:o.position.x,
    z:o.position.z
  }));
  localStorage.setItem("room", JSON.stringify(data));
}

function loadLayout(){
  let data = JSON.parse(localStorage.getItem("room")||"[]");
  data.forEach(d=>{
    addModel('sofa');
  });
}

// BTU
function updateBTU(){
  let btu = objects.length * 500 + 9000;
  document.getElementById('btu').innerHTML = "BTU: "+btu;
}

// loop
function animate(){
  requestAnimationFrame(animate);
  updateBTU();
  renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
