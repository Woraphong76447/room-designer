<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAIKIN AI Cooling Experience</title>
<style>
body { margin:0; background:black; color:white; font-family:-apple-system; overflow:hidden; }
canvas { display:block; }
.ui {
 position:absolute; top:20px; left:20px;
 background:rgba(255,255,255,0.08);
 backdrop-filter: blur(20px);
 padding:20px; border-radius:20px; width:260px;
}
input, select, button { width:100%; margin-top:8px; padding:10px; border-radius:10px; border:none; }
button { background:white; color:black; font-weight:bold; cursor:pointer; }
.logo { font-weight:bold; font-size:18px; margin-bottom:10px; }
.btu {
 position:absolute; bottom:40px; left:50%; transform:translateX(-50%);
 font-size:36px; text-align:center;
}
.buy {
 position:absolute; bottom:40px; right:40px;
 background:#00aaff; padding:15px 20px;
 border-radius:12px; cursor:pointer;
}
</style>
</head>
<body>

<div class="ui">
  <div class="logo">DAIKIN</div>
  กว้าง<input id="w" type="number" value="4">
  ยาว<input id="l" type="number" value="5">
  คน<input id="p" type="number" value="2">
  แดด<select id="s">
    <option value="1">ปกติ</option>
    <option value="1.3">แดดแรง</option>
    <option value="1.6">แดดจัด</option>
  </select>
  <button onclick="analyze()">AI Analyze</button>
</div>

<div class="btu" id="btu">--</div>
<div class="buy" onclick="buy()">ซื้อเลย</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize(); window.onresize = resize;

let airflow = [];

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 // heat map background
 let grad = ctx.createRadialGradient(canvas.width/2,canvas.height/2,50,canvas.width/2,canvas.height/2,400);
 grad.addColorStop(0,"rgba(255,0,0,0.3)");
 grad.addColorStop(1,"rgba(0,0,255,0.3)");
 ctx.fillStyle = grad;
 ctx.fillRect(0,0,canvas.width,canvas.height);

 // airflow particles
 airflow.forEach(p=>{
   p.x += p.vx;
   p.y += p.vy;
   ctx.fillStyle = "rgba(0,200,255,0.7)";
   ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();
 });

 requestAnimationFrame(draw);
}
draw();

function analyze(){
 let w=+wEl.value, l=+lEl.value, p=+pEl.value, s=+sEl.value;
 let btu=(w*l*750 + p*600)*s;
 document.getElementById('btu').innerHTML = Math.round(btu)+" BTU<br><small>Recommended cooling capacity</small>";

 // generate airflow
 airflow=[];
 for(let i=0;i<100;i++){
   airflow.push({x:50,y:canvas.height/2, vx:Math.random()*3+1, vy:(Math.random()-0.5)*2});
 }

 // AI voice
 let msg = new SpeechSynthesisUtterance("Recommended cooling capacity is "+Math.round(btu)+" BTU");
 speechSynthesis.speak(msg);
}

function buy(){
 alert("Redirect to DAIKIN product page");
}

const wEl=document.getElementById('w');
const lEl=document.getElementById('l');
const pEl=document.getElementById('p');
const sEl=document.getElementById('s');

</script>
</body>
</html>
