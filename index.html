<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAIKIN ROOM</title>

<style>
body { margin:0; background:black; color:white; font-family:sans-serif; overflow:hidden; }
.ui {
 position:absolute; top:20px; left:20px;
 background:rgba(255,255,255,0.1);
 padding:15px; border-radius:15px;
}
</style>
</head>

<body>

<div class="ui">
กว้าง <input id="w" type="number" value="4"><br>
ยาว <input id="l" type="number" value="5"><br>
สูง <input id="h" type="number" value="2.6"><br>
<button id="btn">Update</button>
</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js";
import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/controls/OrbitControls.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/loaders/GLTFLoader.js";

// scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// camera
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(5,5,8);

// renderer
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// control
const controls = new OrbitControls(camera, renderer.domElement);

// light
scene.add(new THREE.HemisphereLight(0xffffff,0x444444,1.5));

// ROOM
let roomMesh = null;

function createRoom(w,l,h){
 if(roomMesh) scene.remove(roomMesh);

 const geo = new THREE.BoxGeometry(w,h,l);
 const mat = new THREE.MeshBasicMaterial({color:0x00ffff, wireframe:true});
 roomMesh = new THREE.Mesh(geo, mat);
 roomMesh.position.y = h/2;

 scene.add(roomMesh);
}

// LOADER
const loader = new GLTFLoader();

function loadModel(name,x,y,z,scale){
 loader.load(name,(gltf)=>{
   const obj = gltf.scene;
   obj.position.set(x,y,z);
   obj.scale.set(scale,scale,scale);
   scene.add(obj);
   console.log(name,"OK");
 });
}

// โหลดโมเดล
loadModel("1.glb",0,2,0,1);
loadModel("2.glb",-2,0,0,1);
loadModel("3.obj.glb",2,0,0,1);
loadModel("4.obj.glb",0,0,0,1);

// ✅ FIX updateRoom (ไม่ใช้ onclick)
function updateRoom(){
 let w=+document.getElementById('w').value;
 let l=+document.getElementById('l').value;
 let h=+document.getElementById('h').value;

 createRoom(w,l,h);
}

// bind ปุ่ม
document.getElementById("btn").addEventListener("click", updateRoom);

// init
updateRoom();

// animate
function animate(){
 requestAnimationFrame(animate);
 controls.update();
 renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
