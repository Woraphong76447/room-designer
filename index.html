<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Room Designer PRO+</title>

<style>
body { margin:0; overflow:hidden; background:#dcdcdc; font-family:sans-serif; }

#ui {
  position:absolute;
  left:20px;
  top:20px;
  background:white;
  padding:15px;
  border-radius:12px;
  width:260px;
}

label { font-size:12px; }
input { width:100%; }

#info {
  position:absolute;
  right:20px;
  top:20px;
  background:white;
  padding:15px;
  border-radius:12px;
}
</style>
</head>

<body>

<div id="ui">
  <h3>Room Control</h3>

  <label>กว้าง</label>
  <input type="range" id="w" min="2" max="10" step="0.1" value="5">

  <label>ยาว</label>
  <input type="range" id="l" min="2" max="10" step="0.1" value="5">

  <label>สูง</label>
  <input type="range" id="h" min="2" max="4" step="0.1" value="2.6">

  <button onclick="addAir()">เพิ่มแอร์</button>
  <button onclick="addBed()">เพิ่มเตียง</button>
  <button onclick="addSofa()">เพิ่มโซฟา</button>
</div>

<div id="info">BTU: -</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xdcdcdc);

// 📌 1. ล็อกมุมกล้อง
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(6,6,6);
camera.lookAt(0,0,0);

// renderer
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// 💡 4. แสงสว่างขึ้น
const light = new THREE.DirectionalLight(0xffffff, 1.2);
light.position.set(5,10,5);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(ambient);

// 🌳 7. พื้นลายไม้
const texture = new THREE.TextureLoader().load('https://threejs.org/examples/textures/hardwood2_diffuse.jpg');
texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
texture.repeat.set(4,4);

const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(10,10),
  new THREE.MeshStandardMaterial({map:texture})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// 🧱 ผนังสีขาว
let walls = [];

function createWalls(width, length, height){
  walls.forEach(w=>scene.remove(w));
  walls = [];

  const mat = new THREE.MeshStandardMaterial({color:0xffffff});

  function wall(x,y,z,rot,w,l){
    let m = new THREE.Mesh(new THREE.BoxGeometry(w,height,0.1), mat);
    m.position.set(x,height/2,z);
    m.rotation.y = rot;
    scene.add(m);
    walls.push(m);
  }

  wall(0,0,-length/2,0,width);
  wall(0,0,length/2,0,width);
  wall(-width/2,0,0,Math.PI/2,length);
  wall(width/2,0,0,Math.PI/2,length);
}

// objects
let objects = [];

// 📌 2. แอร์ (placeholder ก่อน)
function addAir(){
  let geo = new THREE.BoxGeometry(1.5,0.4,0.4);
  let mat = new THREE.MeshStandardMaterial({color:0xeeeeee});
  let ac = new THREE.Mesh(geo, mat);
  ac.position.set(0,2.2,-2);
  scene.add(ac);

  createLabel(ac,"DAIKIN 12000 BTU");
  objects.push(ac);
}

// 📌 6. เตียง
function addBed(){
  let geo = new THREE.BoxGeometry(2,0.5,2);
  let mat = new THREE.MeshStandardMaterial({color:0x8888ff});
  let bed = new THREE.Mesh(geo, mat);
  bed.position.set(1,0.25,1);
  scene.add(bed);
  objects.push(bed);
}

// 📌 6. โซฟา
function addSofa(){
  let geo = new THREE.BoxGeometry(2,1,1);
  let mat = new THREE.MeshStandardMaterial({color:0x00aaff});
  let sofa = new THREE.Mesh(geo, mat);
  sofa.position.set(-1,0.5,1);
  scene.add(sofa);
  objects.push(sofa);
}

// 📌 5. ป้ายชื่อ
function createLabel(obj,text){
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = 256;
  canvas.height = 64;

  ctx.fillStyle = "white";
  ctx.fillRect(0,0,256,64);
  ctx.fillStyle = "black";
  ctx.font = "20px Arial";
  ctx.fillText(text,10,40);

  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({map:tex});
  const sprite = new THREE.Sprite(mat);

  sprite.scale.set(2,0.5,1);
  sprite.position.set(0,1.5,0);

  obj.add(sprite);
}

// 📌 3. slider ปรับห้อง
const w = document.getElementById('w');
const l = document.getElementById('l');
const h = document.getElementById('h');

function updateRoom(){
  createWalls(parseFloat(w.value), parseFloat(l.value), parseFloat(h.value));

  let btu = (w.value * l.value * 700);
  document.getElementById("info").innerHTML = "BTU: " + Math.round(btu);
}

w.oninput = updateRoom;
l.oninput = updateRoom;
h.oninput = updateRoom;

updateRoom();

// render
function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
