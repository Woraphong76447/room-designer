<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAIKIN Smart Room Designer</title>
  <style>
    body { margin:0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg,#dff3ff,#ffffff); }
    .app { display:flex; flex-wrap:wrap; }
    .panel { width:320px; padding:20px; background:white; box-shadow:0 0 20px rgba(0,0,0,0.1); }
    h1 { color:#0077cc; font-size:20px; }
    label { font-size:13px; margin-top:10px; display:block; }
    input, select { width:100%; padding:8px; border-radius:8px; border:1px solid #ccc; }
    button { margin-top:15px; width:100%; padding:12px; border:none; background:#0077cc; color:white; border-radius:10px; font-size:16px; cursor:pointer; }
    .result { margin-top:15px; font-size:16px; }

    .canvas-area { flex:1; position:relative; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .room { position:relative; background:#e6f7ff; border:3px solid #0077cc; border-radius:10px; transition:0.3s; }
    .item { position:absolute; padding:6px 10px; background:#0077cc; color:white; border-radius:8px; cursor:move; font-size:12px; }

    .btu-box { position:absolute; top:20px; right:20px; background:white; padding:15px; border-radius:12px; box-shadow:0 5px 20px rgba(0,0,0,0.15); }
  </style>
</head>
<body>
<div class="app">
  <div class="panel">
    <h1>DAIKIN Smart Designer</h1>

    <label>กว้าง (เมตร)</label>
    <input type="number" id="width" value="4">

    <label>ยาว (เมตร)</label>
    <input type="number" id="length" value="5">

    <label>สูง (เมตร)</label>
    <input type="number" id="height" value="2.6">

    <label>จำนวนคน</label>
    <input type="number" id="people" value="2">

    <label>ทิศแดด</label>
    <select id="sun">
      <option value="1">ปกติ</option>
      <option value="1.2">แดดแรง</option>
      <option value="1.4">แดดจัดมาก</option>
    </select>

    <button onclick="calculate()">คำนวณอัจฉริยะ</button>

    <div class="result" id="result"></div>
  </div>

  <div class="canvas-area">
    <div class="room" id="room"></div>
    <div class="btu-box" id="btuBox">BTU: -</div>
  </div>
</div>

<script>
const room = document.getElementById('room');

function updateRoomSize(){
  let w = document.getElementById('width').value * 60;
  let l = document.getElementById('length').value * 60;
  room.style.width = w + 'px';
  room.style.height = l + 'px';
}

function calculate(){
  let w = parseFloat(document.getElementById('width').value);
  let l = parseFloat(document.getElementById('length').value);
  let people = parseFloat(document.getElementById('people').value);
  let sun = parseFloat(document.getElementById('sun').value);

  let area = w * l;
  let btu = (area * 700 + (people * 600)) * sun;

  let size = '';
  if (btu < 9000) size = '9,000 BTU (DAIKIN Compact)';
  else if (btu < 12000) size = '12,000 BTU (DAIKIN Inverter)';
  else if (btu < 18000) size = '18,000 BTU (DAIKIN Smart)';
  else size = '24,000 BTU (DAIKIN Premium)';

  document.getElementById('result').innerHTML = `\n    BTU: <b>${Math.round(btu)}</b><br>
    รุ่นแนะนำ: <b>${size}</b>
  `;

  document.getElementById('btuBox').innerHTML = `BTU: ${Math.round(btu)}`;

  updateRoomSize();
}

// Drag function
function makeDraggable(el){
  let offsetX, offsetY;
  el.onmousedown = function(e){
    offsetX = e.offsetX;
    offsetY = e.offsetY;
    document.onmousemove = function(e){
      el.style.left = (e.pageX - room.offsetLeft - offsetX) + 'px';
      el.style.top = (e.pageY - room.offsetTop - offsetY) + 'px';
    }
    document.onmouseup = function(){ document.onmousemove = null; }
  }
}

function createItem(name,x,y){
  let el = document.createElement('div');
  el.className = 'item';
  el.innerText = name;
  el.style.left = x+'px';
  el.style.top = y+'px';
  room.appendChild(el);
  makeDraggable(el);
}

// default items
createItem('เตียง',20,20);
createItem('โซฟา',100,100);
createItem('หน้าต่าง',200,50);

updateRoomSize();
</script>
</body>
</html>
